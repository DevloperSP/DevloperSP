<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%" height="180" style="background: #0d1117; border-radius: 12px; overflow: hidden; border: 1px solid #1f242c;">
  <style>
    @keyframes pulseGlow {
      0% {
        fill: #00D2FF;
        filter: drop-shadow(0 0 4px #00D2FF) drop-shadow(0 0 10px #00D2FF);
      }
      50% {
        fill: #8A2BE2;
        filter: drop-shadow(0 0 4px #8A2BE2) drop-shadow(0 0 15px #8A2BE2) drop-shadow(0 0 30px #8A2BE2);
      }
      100% {
        fill: #00D2FF;
        filter: drop-shadow(0 0 4px #00D2FF) drop-shadow(0 0 10px #00D2FF);
      }
    }
    @keyframes waveMove {
      0% { transform: translateX(0px); }
      50% { transform: translateX(-50px); }
      100% { transform: translateX(0px); }
    }
    @keyframes textFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    .main-title {
      font-size: 38px;
      font-weight: 900;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      text-anchor: middle;
      letter-spacing: 4px;
      animation: pulseGlow 4s ease-in-out infinite, textFloat 5s ease-in-out infinite;
      transform-origin: center;
    }
    .subtitle {
      fill: #a0aec0;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      text-anchor: middle;
      letter-spacing: 2px;
    }
    .bg-wave {
      fill: none;
      stroke: rgba(0, 210, 255, 0.15);
      stroke-width: 2;
      animation: waveMove 10s ease-in-out infinite;
    }
    .bg-wave-secondary {
      fill: none;
      stroke: rgba(138, 43, 226, 0.15);
      stroke-width: 1.5;
      animation: waveMove 14s ease-in-out infinite reverse;
    }
  </style>
  
  <!-- Wave background decorations -->
  <path class="bg-wave" d="M -100 120 C 100 80, 200 160, 400 120 C 600 80, 700 160, 900 120 L 900 180 L -100 180 Z" />
  <path class="bg-wave-secondary" d="M -100 140 C 150 160, 250 80, 450 140 C 650 160, 750 80, 950 140 L 950 180 L -100 180 Z" />

  <!-- Content -->
  <g transform="translate(0, 0)">
    <text x="400" y="85" class="main-title">DEVELOPER SPARROW</text>
    <text x="400" y="125" class="subtitle">PYTHON DEVELOPER • FULLSTACK EXPERT • AUTOMATION GEEK</text>
  </g>
</svg>
